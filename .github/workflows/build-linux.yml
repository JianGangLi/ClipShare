name: build-linux-appimage-and-binary

# 仓库写入权限
permissions:
  contents: write
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        value: linux-package

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Checkout required submodule
      run: |
        git submodule sync ClipboardListener
        git submodule update --init --force --depth=1 --recursive ClipboardListener
      
    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          desktop-file-utils \
          imagemagick \
          libayatana-appindicator3-dev \
          libgdk-pixbuf-2.0-dev \
          libgtk-3-dev \
          libkeybinder-3.0-dev \
          liblzma-dev \
          libnotify-dev \
          libsecret-1-dev \
          libwayland-bin \
          libwayland-dev \
          libx11-dev \
          libxext-dev \
          libxkbcommon-dev \
          libxtst-dev \
          ninja-build \
          pkg-config \
          wayland-protocols \
          wget

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.35.3
        cache: true

    - name: Flutter pub get
      run: |
        flutter pub get

    - name: Build Linux release
      run: |
        ./scripts/build_linux.sh build

    - name: Package AppImage and binary
      run: |
        ./scripts/build_linux.sh pack_appimage
        ./scripts/build_linux.sh pack_bin
        mkdir -p output
        cp build/appimage/*.AppImage output/
        cp build/linux-bin/*.tar.gz output/
        cp build/linux-bin/*.tar.gz.sha256 output/
        cd output
        sha256sum *.AppImage *.tar.gz > SHA256SUMS.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-pack
        path: output/*
        overwrite: true

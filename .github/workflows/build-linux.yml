name: build-linux-appimage-and-binary

# 仓库写入权限
permissions:
  contents: write
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        value: linux-package

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --platform linux/amd64
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
      FLUTTER_VERSION: "3.35.3"

    steps:
    - name: Install Arch Linux dependencies
      run: |
        pacman -Syu --noconfirm --needed \
          clang \
          cmake \
          curl \
          desktop-file-utils \
          fuse2 \
          gdk-pixbuf2 \
          git \
          gtk3 \
          imagemagick \
          libayatana-appindicator \
          libkeybinder3 \
          libnotify \
          libsecret \
          libx11 \
          libxext \
          libxkbcommon \
          libxtst \
          ninja \
          pkgconf \
          tar \
          unzip \
          wayland \
          wayland-protocols \
          wget \
          which \
          xz \
          zip

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Mark workspace as safe git directory
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Checkout required submodule
      run: |
        git submodule sync ClipboardListener
        git submodule update --init --force --depth=1 --recursive ClipboardListener
      
    - name: Setup Flutter
      run: |
        curl -L \
          "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz" \
          -o /tmp/flutter.tar.xz
        tar -C /opt -xf /tmp/flutter.tar.xz
        git config --global --add safe.directory /opt/flutter
        echo "/opt/flutter/bin" >> "$GITHUB_PATH"
        echo "/opt/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
        /opt/flutter/bin/flutter config --no-analytics
        /opt/flutter/bin/dart --disable-analytics
        /opt/flutter/bin/flutter --version

    - name: Flutter pub get
      run: |
        flutter pub get

    - name: Build Linux release
      run: |
        ./scripts/build_linux.sh build

    - name: Package AppImage and binary
      run: |
        ./scripts/build_linux.sh pack_appimage
        ./scripts/build_linux.sh pack_bin
        mkdir -p output
        cp build/appimage/ClipShare-*.AppImage output/
        cp build/linux-bin/*.tar.gz output/
        cp build/linux-bin/*.tar.gz.sha256 output/
        cd output
        sha256sum *.AppImage *.tar.gz > SHA256SUMS.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-pack
        path: output/*
        overwrite: true
